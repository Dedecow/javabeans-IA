deepseek:
  endpoint: ${DEEPSEEK_ENDPOINT:https://api.deepseek.com/v1}
  key: ${DEEPSEEK_API_KEY:}

spring:
  datasource:
    url: jdbc:h2:mem:javabeansdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
